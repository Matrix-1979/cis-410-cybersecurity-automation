
name: Hello Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build step
        run: echo "Building the project..."

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Test step
        run: echo "Running tests..."

  deploy:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Deploy step
        run: echo "Deploying application..."